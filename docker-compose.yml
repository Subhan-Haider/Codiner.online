version: '3.8'

services:
  dashboard:
    build: .
    container_name: codiner-dashboard
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - codiner-network

  nginx:
    image: nginx:alpine
    container_name: codiner-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - dashboard
    networks:
      - codiner-network

networks:
  codiner-network:
    driver: bridge
